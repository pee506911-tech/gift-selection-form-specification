name = "jotform"
main = "src/worker/index.ts"
compatibility_date = "2024-12-01"

# Serve static assets from dist directory
[assets]
directory = "dist"
binding = "ASSETS"

# TiDB Serverless Connection
# Set your TiDB connection string as a secret:
# npx wrangler secret put TIDB_CONNECTION_STRING
# Format: mysql://user:password@host:4000/database?sslaccept=strict

# R2 Bucket Binding for image storage
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "gift-images"

# Durable Objects binding
[[durable_objects.bindings]]
name = "FORM_DO"
class_name = "FormDO"

# Durable Objects migration
[[migrations]]
tag = "v1"
new_classes = ["FormDO"]

# Environment variables
[vars]
ENVIRONMENT = "development"
ADMIN_PASSWORD_HASH = "123y"  # Set in production

# Development environment variables
[env.dev]
vars = { ENVIRONMENT = "development" }

# Production environment
[env.production]
vars = { ENVIRONMENT = "production" }
