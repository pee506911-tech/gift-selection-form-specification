name = "jotform"
main = "src/worker/index.ts"
compatibility_date = "2024-12-01"

# Serve static assets from dist directory
[assets]
directory = "dist"
binding = "ASSETS"

# Environment variables (non-sensitive)
[vars]
ENVIRONMENT = "development"
ADMIN_PASSWORD_HASH = "$2b$10$oYNCioi0PumlFx.c0M849unj2o2NJZcEL/k45FmS1USLJoqq/0Ble"  # Change this!

# Secrets (sensitive - DO NOT put actual values here)
# Set these using: npx wrangler secret put SECRET_NAME
# Required secrets:
# - TIDB_CONNECTION_STRING: Your TiDB connection string
#
# For local development, create .dev.vars file with actual values

# TiDB Serverless Connection
# Set your TiDB connection string as a secret:
# npx wrangler secret put TIDB_CONNECTION_STRING
# Format: mysql://user:password@host:4000/database?sslaccept=strict

# Durable Objects binding
[[durable_objects.bindings]]
name = "FORM_DO"
class_name = "FormDO"

# Durable Objects migration
[[migrations]]
tag = "v1"
new_sqlite_classes = ["FormDO"]  # Use new_sqlite_classes for free plan

# Development environment variables
[env.dev]
vars = { ENVIRONMENT = "development" }

# Production environment
[env.production]
vars = { ENVIRONMENT = "production" }
