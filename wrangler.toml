name = "jotform"
main = "src/worker/index.ts"
compatibility_date = "2024-12-01"

# Serve static assets from dist directory
[assets]
directory = "dist"
binding = "ASSETS"

# TiDB Database Binding (D1-compatible for serverless driver)
[[d1_databases]]
binding = "DB"
database_name = "gift_selection_db"
database_id = "your-database-id"  # Replace with actual D1 database ID

# R2 Bucket Binding for image storage
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "gift-images"

# Durable Objects binding
[[durable_objects.bindings]]
name = "FORM_DO"
class_name = "FormDO"

# Durable Objects migration
[[migrations]]
tag = "v1"
new_classes = ["FormDO"]

# Environment variables
[vars]
ENVIRONMENT = "development"
ADMIN_PASSWORD_HASH = "123y"  # Set in production

# Development environment variables
[env.dev]
vars = { ENVIRONMENT = "development" }

# Production environment
[env.production]
vars = { ENVIRONMENT = "production" }
